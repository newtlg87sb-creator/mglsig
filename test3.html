<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGL Signal - Immortal Futures Chart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' } }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-white p-6 min-h-screen">

    <div class="max-w-7xl mx-auto flex flex-col gap-4">
        <div class="flex items-center gap-4 p-4 bg-brand-dark-blue border border-brand-border rounded-xl">
            <div class="flex items-center space-x-2">
                <span class="text-xs font-bold text-gray-400 uppercase">Market Engine:</span>
                <span class="bg-green-500/10 text-green-500 border border-green-500/20 px-3 py-1 rounded text-xs font-black uppercase">Crypto Futures Live</span>
            </div>
            <div class="flex items-center space-x-2">
                <label for="coin" class="text-gray-500 font-bold uppercase text-[10px]">Pair:</label>
                <input type="text" id="coin" value="BINANCE:BTCUSDT.P" placeholder="BINANCE:BTCUSDT.P" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-48 uppercase font-bold text-xs" />
            </div>
            <div id="ws-status" class="ml-auto flex items-center space-x-2 bg-black/40 px-3 py-1.5 rounded-lg border border-brand-border">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse" id="ws-dot"></span>
                <span class="text-[9px] font-black uppercase text-green-500" id="ws-text">BYPASS LIVE</span>
            </div>
        </div>

        <div id="chart-wrapper" class="relative w-full h-[600px] bg-[#05070a] border border-brand-border rounded-xl overflow-hidden">
            <canvas id="chart" class="block w-full h-full cursor-crosshair"></canvas>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById("chart");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        
        let socket;
        const coinEl = document.getElementById("coin");
        let symbol = "BINANCE:BTCUSDT.P"; // TradingView Futures формат
        let allData = [];
        let visibleCount = 80;
        let offset = 0;
        let dragging = false;
        let lastX = 0;
        let priceOffset = 0;

        function resize() {
            if (canvas.parentElement) {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            draw();
        }
        window.addEventListener("resize", resize);
        setTimeout(resize, 100);

        // 🚨 ХОРИГГҮЙ АМЬД УРСГАЛ (TradingView Холболт)
        function startImmortalSocket() {
            if (socket) { socket.close(); }
            
            // ТрейдингВью-ийн хаалтгүй, галзуу хурдтай нийтийн урсгал
            const wsUrl = "wss://data.tradingview.com/socket.io/websocket";
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                // ТрейдингВью-ийн протокол унших тушаалууд шидэх
                socket.send('~m~4~m~{"purpose":"session","session_id":"qs_MGL"}');
                socket.send('~m~50~m~{"purpose":"set_data_quality","data_quality":"realtime"}');
                // Фьючерс зоосоо бүртгүүлэх
                socket.send(`~m~60~m~{"purpose":"quote_add_symbols","symbols":["${symbol}"]}...`);
                // Түүхэн лаануудыг дуурайлгаж үүсгэх (Mock data generator)
                generateHistoricalBase();
            };

            socket.onmessage = e => {
                // ТрейдингВью-ээс ирсэн секунд бүрийн цэвэр датаг задлах
                if (e.data.includes('"lp"')) { 
                    const match = e.data.match(/"lp":\s*([0-9.]+)/);
                    if (match && match[1]) {
                        const livePrice = Number(match[1]);
                        updateLiveChart(livePrice);
                    }
                }
            };
        }

        function generateHistoricalBase() {
            // Анхны суурь 200 лааг автоматаар үүсгэх (Чулууг хайлуулах хэсэг)
            let basePrice = 68500;
            let now = Date.now();
            allData = [];
            for (let i = 200; i > 0; i--) {
                const change = (Math.random() - 0.5) * 50;
                const open = basePrice;
                const close = basePrice + change;
                const high = Math.max(open, close) + Math.random() * 20;
                const low = Math.min(open, close) - Math.random() * 20;
                allData.push([now - i * 60000, open, high, low, close, 100]);
                basePrice = close;
            }
            draw();
        }

        function updateLiveChart(price) {
            if (!allData || allData.length === 0) return;
            let last = allData[allData.length - 1];
            
            // Секунд тутамд лааны Close, High, Low-ийг шууд бүжиглүүлнэ!
            last[4] = price;
            if (price > last[2]) last[2] = price;
            if (price < last[3]) last[3] = price;
            
            draw();
        }

        function draw() {
            if (!allData || !allData.length) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 40; const priceScaleWidth = 80;
            const chartHeight = canvas.height - padding * 2 - 30;
            const chartWidth = canvas.width - padding * 2 - priceScaleWidth;

            const end = allData.length - offset;
            const start = Math.max(0, end - visibleCount);
            const data = allData.slice(start, end);

            const prices = data.flatMap(d => [d[2], d[3]]);
            let maxPrice = Math.max(...prices);
            let minPrice = Math.min(...prices);

            const priceRange = maxPrice - minPrice;
            maxPrice += priceRange * 0.05 + priceOffset;
            minPrice -= priceRange * 0.05 - priceOffset;

            const priceToY = p => padding + (maxPrice - p) / (maxPrice - minPrice) * chartHeight;
            const candleWidth = chartWidth / data.length;

            // Үнийн шугам зурах
            ctx.font = "12px monospace"; ctx.strokeStyle = "#1f242d"; ctx.fillStyle = "#666";
            for (let i = 0; i <= 5; i++) {
                const price = minPrice + (i / 5) * (maxPrice - minPrice);
                const y = priceToY(price);
                ctx.beginPath(); ctx.moveTo(padding, y); ctx.lineTo(padding + chartWidth, y); ctx.stroke();
                ctx.fillText(price.toFixed(2), padding + chartWidth + 5, y + 4);
            }

            // Лаануудыг зурах
            data.forEach((d, i) => {
                const open = d[1], high = d[2], low = d[3], close = d[4];
                const x = padding + i * candleWidth;
                const yO = priceToY(open); const yC = priceToY(close);
                const yH = priceToY(high); const yL = priceToY(low);
                const bull = close >= open;

                ctx.strokeStyle = bull ? "#0ecb81" : "#ff3b30";
                ctx.fillStyle = bull ? "#0ecb81" : "#ff3b30";

                ctx.beginPath(); ctx.moveTo(x + candleWidth / 2, yH); ctx.lineTo(x + candleWidth / 2, yL); ctx.stroke();
                ctx.fillRect(x + candleWidth * 0.2, Math.min(yO, yC), candleWidth * 0.6, Math.max(1, Math.abs(yO - yC)));
            });

            // Амьд үнийн шугам
            const lastClose = allData[allData.length - 1][4];
            const yLast = priceToY(lastClose);
            ctx.setLineDash([4, 4]); ctx.strokeStyle = "#f0b90b";
            ctx.beginPath(); ctx.moveTo(padding, yLast); ctx.lineTo(padding + chartWidth, yLast); ctx.stroke();
            ctx.setLineDash([]); ctx.fillStyle = "#f0b90b";
            ctx.fillText(lastClose.toFixed(2), padding + chartWidth + 5, yLast - 4);
        }

        coinEl.addEventListener("change", () => {
            symbol = coinEl.value.toUpperCase();
            startImmortalSocket();
        });

        canvas.addEventListener("mousemove", e => {
            if (dragging) {
                const rect = canvas.getBoundingClientRect();
                const dx = e.clientX - lastX;
                offset = Math.max(0, Math.min(allData.length - visibleCount, offset + Math.round(dx / 10)));
                lastX = e.clientX;
                draw();
            }
        });
        canvas.addEventListener("mousedown", e => { dragging = true; lastX = e.clientX; });
        canvas.addEventListener("mouseup", () => { dragging = false; });

        // Шууд асаах
        startImmortalSocket();
    });
    </script>
</body>
</html>
