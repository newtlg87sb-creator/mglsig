<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Chart Engine - MGL Signal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' } },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">
    <script src="/static/js/header.js"></script>

    <main class="flex-grow pt-32 pb-12 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            
            <!-- chart.js ажиллахад шаардлагатай удирдлагууд -->
            <div class="controls-container flex flex-wrap items-center gap-4 p-4 bg-brand-dark-blue border border-brand-border rounded-xl shadow-lg">
                <select id="market" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs">
                    <option value="futures">Futures</option>
                    <option value="spot">Spot</option>
                </select>
                <select id="interval" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 text-xs">
                    <option value="1m" selected>1m</option>
                    <option value="5m">5m</option>
                    <option value="1h">1h</option>
                </select>
                <input type="text" id="coin" value="BTCUSDT" class="bg-brand-dark border border-brand-border text-white rounded px-3 py-1.5 w-32 uppercase font-bold text-xs" />
                
                <!-- chart.js-ийн хайж буй нэмэлт оролтууд -->
                <input type="hidden" id="range-select" value="30">
                <input type="hidden" id="rsi-period" value="14">
                <input type="hidden" id="amount" value="100">
                <input type="hidden" id="leverage" value="20">
            </div>

            <!-- Үндсэн хөдөлгүүрийг дуудах -->
            <script src="/static/js/chart.js"></script>
        </div>
    </main>
</body>
</html>
