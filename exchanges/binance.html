<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Spot Live - MGL Signal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' }
                    },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'], 'mono': ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
    <style>
        body { background-color: #05070a; color: #e2e8f0; }
        .log-box { background-color: #000; color: #00ff00; font-family: 'Consolas', monospace; font-size: 11px; }
        .terminal-table th { position: sticky; top: 0; background: #0f1217; z-index: 10; border-bottom: 1px solid #1f242d; }
        .cell-mono { font-family: 'JetBrains Mono', monospace; }
        .luxury-line { height: 1.5px; background: linear-gradient(90deg, #f3ba2f 0%, rgba(243, 186, 47, 0.4) 50%, transparent 100%); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #05070a; }
        ::-webkit-scrollbar-thumb { background: #1f242d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f3ba2f; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-inter">
    <script src="/static/js/header.js"></script>

    <main class="flex-grow pt-36 pb-12 px-4 md:px-6 relative">
        <div class="absolute top-40 left-1/4 w-96 h-96 bg-[#f3ba2f] opacity-[0.03] blur-[120px] pointer-events-none"></div>

        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-6 h-[700px] relative z-10">
            
            <!-- Зүүн тал: Лог -->
            <div class="w-full lg:w-[30%] flex flex-col gap-4">
                <div class="flex items-center space-x-2">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">
                        <i class="fas fa-terminal mr-2 text-[#f3ba2f]"></i> Binance Engine Logs
                    </h2>
                </div>
                <div class="flex-grow flex flex-col bg-black border border-brand-border rounded-2xl overflow-hidden shadow-2xl">
                    <div id="log-container" class="log-box flex-grow p-5 overflow-y-auto">
                        <div class="opacity-30 italic">[System] Initializing Binance Data Stream...</div>
                    </div>
                </div>
            </div>

            <!-- Баруун тал: Хүснэгт -->
            <div class="w-full lg:w-[70%] flex flex-col gap-4">
                <div class="flex items-center justify-between bg-brand-dark-blue border border-brand-border p-4 rounded-2xl shadow-xl relative overflow-hidden">
                    <div class="luxury-line absolute top-0 left-0 w-32"></div>
                    
                    <div class="flex items-center gap-4">
                        <div class="relative flex items-center">
                            <i class="fas fa-search absolute left-3 text-gray-400 text-[10px]"></i>
                            <input type="text" id="symbol-search" oninput="renderUI()" placeholder="Search Binance..." class="bg-black/40 border border-brand-border rounded-xl py-2.5 pl-9 pr-4 text-[10px] text-white focus:border-[#f3ba2f] outline-none transition-all w-40 md:w-56 font-bold uppercase tracking-widest">
                        </div>
                    </div>

                    <div class="flex items-center gap-4">
                        <div id="status-timer" class="px-4 py-2 rounded-lg bg-green-500/10 border border-green-500/20 text-[10px] font-mono font-black text-green-500 uppercase tracking-tighter">
                            LIVE
                        </div>
                    </div>
                </div>

                <div class="flex-grow bg-brand-dark-blue border border-brand-border rounded-2xl overflow-hidden shadow-2xl relative flex flex-col">
                    <div class="overflow-y-auto flex-grow">
                        <table class="w-full text-left border-collapse terminal-table">
                            <thead class="text-[10px] text-gray-500 uppercase font-black tracking-widest border-b border-brand-border">
                                <tr>
                                    <th class="p-5 cursor-pointer hover:text-white transition-colors" onclick="updateSort('symbol')">Symbol <i class="fas fa-sort ml-1 opacity-30"></i></th>
                                    <th class="p-5 cursor-pointer hover:text-white transition-colors" onclick="updateSort('last')">Price <i class="fas fa-sort ml-1 opacity-30"></i></th>
                                    <th class="p-5 cursor-pointer hover:text-white transition-colors" onclick="updateSort('bid')">Bid <i class="fas fa-sort ml-1 opacity-30"></i></th>
                                    <th class="p-5 cursor-pointer hover:text-white transition-colors" onclick="updateSort('ask')">Ask <i class="fas fa-sort ml-1 opacity-30"></i></th>
                                    <th class="p-5 cursor-pointer hover:text-white transition-colors" onclick="updateSort('spread')">Spread <i class="fas fa-sort ml-1 opacity-30"></i></th>
                                    <th class="p-5 cursor-pointer hover:text-white transition-colors" onclick="updateSort('change24h')">24h% <i class="fas fa-sort ml-1 opacity-30"></i></th>
                                    <th class="p-5 cursor-pointer hover:text-white transition-colors" onclick="updateSort('volume')">Volume <i class="fas fa-sort ml-1 opacity-30"></i></th>
                                </tr>
                            </thead>
                            <tbody id="market-body" class="cell-mono text-[12px] divide-y divide-brand-border/20">
                                <tr>
                                    <td colspan="7" class="p-20 text-center text-gray-600 uppercase text-[10px] font-bold tracking-[0.3em]">
                                        Connecting to Binance Gateway...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>

    <script>
        let isRunning = true;
        let allData = [];
        let currentSort = { col: 'symbol', desc: false };
        let countdownInterval = null;
        let isFirstFetch = true;
        let currentCooldown = 10000;

        function addLog(msg) {
            const container = document.getElementById('log-container');
            if (container.children.length > 25) container.removeChild(container.firstChild);
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = "mb-1";
            logEntry.textContent = `[${time}] ${msg}`;
            container.appendChild(logEntry);
            container.scrollTop = container.scrollHeight;
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/binance');
                
                if (res.status === 429) {
                    addLog("⚠️ Rate Limit: Binance ачаалал их байна. 20с амарч байна...");
                    document.getElementById('status-timer').textContent = "COOLING";
                    document.getElementById('status-timer').className = "px-4 py-2 rounded-lg bg-red-500/10 border border-red-500/20 text-[10px] font-mono font-black text-red-500 uppercase tracking-tighter";
                    if (isRunning) setTimeout(fetchData, 20000);
                    return;
                }

                if (!res.ok) throw new Error(`Gateway Error: ${res.status}`);
                const json = await res.json();
                
                if (Array.isArray(json)) {
                    allData = json
                        .filter(t => t.symbol.endsWith('USDT'))
                        .map(t => {
                            const last = parseFloat(t.lastPrice) || 0;
                            const bid = parseFloat(t.bidPrice) || 0;
                            const ask = parseFloat(t.askPrice) || 0;
                            return {
                                symbol: t.symbol,
                                last: last,
                                bid: bid,
                                ask: ask,
                                spread: ask > 0 ? ((ask - bid) / ask * 100) : 0,
                                change24h: parseFloat(t.priceChangePercent) || 0,
                                volume: parseFloat(t.quoteVolume) || 0
                            };
                        });
                    
                    if (allData.length > 0 && isRunning) {
                        currentCooldown = 10000; // Reset cooldown
                        const timerEl = document.getElementById('status-timer');
                        timerEl.className = "px-4 py-2 rounded-lg bg-green-500/10 border border-green-500/20 text-[10px] font-mono font-black text-green-500 uppercase tracking-tighter";
                        
                        if (isFirstFetch) {
                            addLog(`Binance-тай холбогдлоо: ${allData.length} USDT хос.`);
                            isFirstFetch = false;
                        }
                        startTimer();
                        renderUI();
                    }
                }
            } catch (err) {
                addLog(`⚠️ Алдаа: ${err.message}`);
                // Хэрэв 500 алдаа гарвал дараагийн удаа арай удаан хүлээж оролдоно
                if (err.message.includes('500')) currentCooldown = 15000;
            }
            
            if (isRunning) setTimeout(fetchData, currentCooldown);
        }

        function renderUI() {
            const tbody = document.getElementById('market-body');
            if (!tbody) return;
            const search = document.getElementById('symbol-search').value.toUpperCase();
            
            const filtered = allData.filter(d => d.symbol.includes(search));
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="p-20 text-center text-gray-700 text-[10px] font-bold">No results found</td></tr>';
                return;
            }

            const sorted = filtered.sort((a, b) => {
                const valA = a[currentSort.col], valB = b[currentSort.col];
                if (typeof valA === 'string') return currentSort.desc ? valB.localeCompare(valA) : valA.localeCompare(valB);
                return currentSort.desc ? (valB - valA) : (valA - valB);
            });

            tbody.innerHTML = sorted.slice(0, 100).map(d => `
                <tr class="hover:bg-white/[0.02] transition-colors group">
                    <td class="p-4 text-white font-bold tracking-tight border-l-2 border-transparent group-hover:border-[#f3ba2f] group-hover:text-[#f3ba2f] transition-all">${d.symbol}</td>
                    <td class="p-4 text-gray-400 font-medium">${formatPrice(d.last)}</td>
                    <td class="p-4 text-red-500/80 font-bold">${formatPrice(d.bid)}</td>
                    <td class="p-4 text-green-500/80 font-bold">${formatPrice(d.ask)}</td>
                    <td class="p-4 text-[#f3ba2f] font-bold">${d.spread.toFixed(3)}%</td>
                    <td class="p-4 font-black ${d.change24h >= 0 ? 'text-green-500' : 'text-red-500'}">${d.change24h >= 0 ? '+' : ''}${d.change24h.toFixed(2)}%</td>
                    <td class="p-4 text-gray-500 font-medium">${formatVol(d.volume)}</td>
                </tr>
            `).join('');
        }

        function startTimer() {
            clearInterval(countdownInterval);
            let rem = 10.0;
            const timerEl = document.getElementById('status-timer');
            countdownInterval = setInterval(() => {
                rem -= 0.1;
                if (rem <= 0) clearInterval(countdownInterval);
                else timerEl.textContent = `LIVE: ${rem.toFixed(1)}S`;
            }, 100);
        }

        function updateSort(col) {
            if (currentSort.col === col) currentSort.desc = !currentSort.desc;
            else { currentSort.col = col; currentSort.desc = false; }
            renderUI();
        }

        function formatVol(vol) {
            if (vol >= 1000000) return (vol / 1000000).toFixed(2) + 'M';
            if (vol >= 1000) return (vol / 1000).toFixed(1) + 'K';
            return vol.toFixed(0);
        }

        function formatPrice(p) {
            return p === 0 ? "0.00" : (p < 1 ? p.toFixed(8) : p.toFixed(4));
        }

        fetchData();
    </script>
</body>
</html>
