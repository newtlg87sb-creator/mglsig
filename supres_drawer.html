<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Support & Resistance - MGL Signal</title>
    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' } },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">
    <script src="/static/js/header.js"></script>

    <main class="flex-grow pt-32 pb-12 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            <div class="mb-2">
                <a href="/main_live_tools.html" class="inline-flex items-center text-gray-500 hover:text-brand-gold transition text-[10px] font-black uppercase tracking-widest">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Live Tools
                </a>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-2">
                <div>
                    <h1 class="text-3xl font-black text-white uppercase tracking-tighter">S/R <span class="text-brand-gold italic">Trendlines</span></h1>
                    <p class="text-gray-500 text-[10px] mt-1 uppercase font-bold tracking-[0.3em]">Automatic Pivot Point Geometry</p>
                </div>
            </div>

            <!-- Engine Controls -->
            <script src="/static/js/control.js" data-hide="rsi, ema, ma, leverage, balance, side"></script>

            <div class="data-grid sm:grid-cols-2 lg:grid-cols-4">
                <div class="data-card"><div class="label">Current Price</div><div id="futures-price-display" class="value price">--</div></div>
                <div class="data-card"><div class="label">Major Resistance</div><div id="val-hh" class="value down">--</div></div>
                <div class="data-card"><div class="label">Major Support</div><div id="val-ll" class="value up">--</div></div>
                <div class="data-card"><div class="label">Pivot Sensitivity</div><div class="value">10 L/R</div></div>
            </div>

            <!-- Main Engine Scripts -->
            <script src="/static/js/data.js"></script>
            <script src="/static/js/candle.js"></script>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>
    <script src="/static/lock.js"></script>

    <script>
    /**
     * S/R TRENDLINE PLUGIN
     */
    window.onChartDrawOverlay = function(ctx, engine) {
        const { priceToY, candleWidth, padding, visibleStartIndex, visibleData, chartWidth } = engine;
        
        // data.js-ээс тооцоолсон Pivot-уудыг авах
        const pivots = window.mglIndicators?.pivots;
        if (!pivots) return;

        const { highs, lows } = pivots;
        const endX = padding + chartWidth;

        // ── Resistance (Red Line) ──
        if (highs.length >= 2) {
            const p1 = highs[highs.length - 2];
            const p2 = highs[highs.length - 1];
            
            // Зөвхөн сүүлийн 2 Pivot-оор тренд шугам татна
            const x1 = padding + (p1.i - visibleStartIndex) * candleWidth + candleWidth / 2;
            const y1 = priceToY(p1.price);
            const x2 = padding + (p2.i - visibleStartIndex) * candleWidth + candleWidth / 2;
            const y2 = priceToY(p2.price);

            if (x2 > padding) { // Харагдах хүрээнд байвал зурна
                const slope = (y2 - y1) / (x2 - x1);
                const lineEndY = y2 + slope * (endX - x2);

                ctx.lineWidth = 2;
                ctx.strokeStyle = '#f6465d';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(endX, lineEndY);
                ctx.stroke();
            }
        }

        // ── Support (Green Line) ──
        if (lows.length >= 2) {
            const p1 = lows[lows.length - 2];
            const p2 = lows[lows.length - 1];
            
            const x1 = padding + (p1.i - visibleStartIndex) * candleWidth + candleWidth / 2;
            const y1 = priceToY(p1.price);
            const x2 = padding + (p2.i - visibleStartIndex) * candleWidth + candleWidth / 2;
            const y2 = priceToY(p2.price);

            if (x2 > padding) {
                const slope = (y2 - y1) / (x2 - x1);
                const lineEndY = y2 + slope * (endX - x2);

                ctx.lineWidth = 2;
                ctx.strokeStyle = '#0ecb81';
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(endX, lineEndY);
                ctx.stroke();
            }
        }

        ctx.setLineDash([]);
    };
    </script>
</body>
</html>
