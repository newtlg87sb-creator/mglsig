<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Tunnel - MGL Signal</title>
    <link rel="icon" type="image/png" href="/static/new/images/logogo1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 'dark': '#05070a', 'dark-blue': '#0f1217', 'gold': '#c5a059', 'border': '#1f242d' } },
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/main_style.css">
</head>
<body class="bg-brand-dark text-white font-inter flex flex-col min-h-screen">
    <script src="/static/js/header.js"></script>

    <main class="flex-grow pt-32 pb-12 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex flex-col gap-6">
            <div class="mb-4">
                <a href="/main_live_tools.html" class="inline-flex items-center text-gray-500 hover:text-brand-gold transition text-[10px] font-black uppercase tracking-widest">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Live Tools
                </a>
            </div>

            <script src="/static/js/control.js"></script>

            <div class="data-grid sm:grid-cols-2 lg:grid-cols-4">
                <div class="data-card"><div class="label">Spot Price</div><div id="spot-price-display" class="value price">--</div></div>
                <div class="data-card"><div class="label">Future Price</div><div id="futures-price-display" class="value price">--</div></div>
                <div class="data-card"><div class="label">Upper Tunnel</div><div id="val-upper" class="value down">--</div></div>
                <div class="data-card"><div class="label">Lower Tunnel</div><div id="val-lower" class="value up">--</div></div>
            </div>

            <!-- Engine Scripts -->
            <script src="/static/js/data.js"></script>
            <script src="/static/js/candle.js"></script>
        </div>
    </main>

    <script src="/static/js/footer.js"></script>
    <script src="/static/lock.js"></script>

    <script>
    /**
     * TUNNEL PLUGIN - Зөвхөн стратегийн логик
     */
    window.onChartDrawOverlay = function(ctx, engine) {
        const { priceToY, candleWidth, padding, visibleData, visibleStartIndex, allData } = engine;
        
        // 1. RSI тооцоолох логик (Скриптийг бие даасан болгов)
        const calculateRSI = (data, period = 14) => {
            if (data.length <= period) return new Array(data.length).fill(null);
            const rsi = new Array(data.length).fill(null);
            let gains = 0, losses = 0;
            
            for (let i = 1; i <= period; i++) {
                const change = data[i][4] - data[i-1][4];
                if (change >= 0) gains += change; else losses -= change;
            }
            
            let avgGain = gains / period;
            let avgLoss = losses / period;
            rsi[period] = 100 - (100 / (1 + (avgGain / (avgLoss || 0.0001))));

            for (let i = period + 1; i < data.length; i++) {
                const change = data[i][4] - data[i-1][4];
                avgGain = (avgGain * (period - 1) + (change > 0 ? change : 0)) / period;
                avgLoss = (avgLoss * (period - 1) + (change < 0 ? -change : 0)) / period;
                rsi[i] = 100 - (100 / (1 + (avgGain / (avgLoss || 0.0001))));
            }
            return rsi;
        };

        const rsiValues = calculateRSI(allData, 14);
        if (!rsiValues || rsiValues.length < 2) return;

        let current_long = null, current_short = null;
        const upperHistory = new Array(allData.length).fill(null);
        const lowerHistory = new Array(allData.length).fill(null);
        const avgHistory = new Array(allData.length).fill(null);

        for (let i = 2; i < allData.length; i++) {
            const r0 = rsiValues[i];
            const r1 = rsiValues[i-1];

            if (r0 !== null && r1 !== null) {
                if (r1 < 30 && r0 >= 30) current_long = Math.min(allData[i][3], allData[i-1][3], allData[i-2][3]);
                if (r1 > 70 && r0 <= 70) current_short = Math.max(allData[i][2], allData[i-1][2], allData[i-2][2]);
            }
            upperHistory[i] = current_short;
            lowerHistory[i] = current_long;
            avgHistory[i] = (current_long !== null && current_short !== null) ? (current_long + current_short) / 2 : null;
        }

        const drawTunnelLine = (historyArray, color, isDashed = false) => {
            ctx.strokeStyle = color; ctx.lineWidth = 2;
            if (isDashed) ctx.setLineDash([5, 5]);
            ctx.beginPath();
            let first = true;
            for (let i = 0; i < visibleData.length; i++) {
                const val = historyArray[visibleStartIndex + i];
                if (!val) continue;
                const x = padding + i * candleWidth + candleWidth / 2;
                const y = priceToY(val);
                if (first) { ctx.moveTo(x, y); first = false; } else ctx.lineTo(x, y);
            }
            ctx.stroke(); ctx.setLineDash([]);
        };

        drawTunnelLine(upperHistory, "#ef4444");
        drawTunnelLine(lowerHistory, "#10b981");
        drawTunnelLine(avgHistory, "rgba(255,255,255,0.2)", true);

        // UI мэдээлэл шинэчлэх
        const lastPrice = allData[allData.length - 1][4];
        const market = document.getElementById('market')?.value || 'futures';
        const spotEl = document.getElementById('spot-price-display');
        const futureEl = document.getElementById('futures-price-display');
        
        if (market === 'spot') {
            if (spotEl) spotEl.textContent = '$' + lastPrice.toLocaleString();
        } else {
            if (futureEl) futureEl.textContent = '$' + lastPrice.toLocaleString();
        }

        if (document.getElementById('val-upper')) document.getElementById('val-upper').textContent = current_short?.toLocaleString() || '--';
        if (document.getElementById('val-lower')) document.getElementById('val-lower').textContent = current_long?.toLocaleString() || '--';
    };
    </script>
</body>
</html>
