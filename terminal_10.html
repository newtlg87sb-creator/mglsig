<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGL Unified Scanner (Spot & Future)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        .cell-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
        .table-container { height: calc(100vh - 250px); overflow-y: auto; background: #000; }
        table { border-collapse: collapse; width: 100%; }
        th { position: sticky; top: 0; background: #333; z-index: 10; padding: 10px; text-align: left; font-size: 11px; border-bottom: 2px solid #444; }
        td { padding: 6px 10px; border-bottom: 1px solid #222; }
        .pos-pct { color: #00ff00; }
        .neg-pct { color: #ff4444; }
        .spread-val { color: #ffff00; }
        .log-box { background-color: #000; color: #00ff00; font-family: 'Consolas', monospace; font-size: 10px; height: calc(100vh - 250px); overflow-y: auto; border: 1px solid #333; padding: 10px; }
        .tag-st { background: #ff0000; color: white; padding: 1px 4px; border-radius: 2px; font-weight: bold; font-size: 9px; }
        input, select { background: #333; color: white; border: 1px solid #444; padding: 4px 8px; outline: none; }
        .btn-ex { padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold italic">MGL UNIFIED SCANNER</h1>
        <div class="flex items-center gap-4">
            <label class="text-xs font-bold">MARKET TYPE:</label>
            <select id="market-type" onchange="resetAndFetch()">
                <option value="spot">SPOT</option>
                <option value="swap">FUTURE (PERP)</option>
            </select>
            <input type="text" id="global-search" oninput="renderUI()" placeholder="Search Symbol..." class="text-xs w-48">
            <div id="master-timer" class="text-xs font-mono bg-black px-2 py-1 border border-gray-700">OFF</div>
        </div>
    </div>

    <div id="exchange-buttons" class="flex flex-wrap gap-2 mb-4">
        <!-- Buttons injected here -->
    </div>

    <div class="flex gap-4">
        <!-- 1/5 Logs Window -->
        <div class="w-1/5 flex flex-col gap-2">
            <h2 class="text-[10px] font-black uppercase text-gray-500 tracking-widest"><i class="fas fa-terminal mr-2"></i>Engine Logs</h2>
            <div id="log-container" class="log-box rounded border-gray-800">
                <div class="opacity-30 italic">[System] Terminal Initialized...</div>
            </div>
        </div>

        <!-- 4/5 Table Window -->
        <div class="w-4/5 table-container border border-gray-800 rounded">
            <table id="scanner-table">
                <thead>
                    <tr>
                        <th onclick="updateSort('name')">Name</th>
                        <th onclick="updateSort('symbol')">Symbol</th>
                        <th onclick="updateSort('price')" class="text-right">Price</th>
                        <th onclick="updateSort('bid')" class="text-right">Bid (Sell)</th>
                        <th onclick="updateSort('ask')" class="text-right">Ask (Buy)</th>
                        <th onclick="updateSort('spread')" class="text-right">Spread %</th>
                        <th onclick="updateSort('change')" class="text-right">24h %</th>
                        <th onclick="updateSort('min_usdt')" class="text-right">Min Trade</th>
                        <th onclick="updateSort('tags')">Tags</th>
                    </tr>
                </thead>
                <tbody id="master-table" class="cell-mono"></tbody>
            </table>
        </div>
    </div>

    <script>
        const exchangeList = {
            binance: '#28a745', kucoin: '#009292', mexc: '#00b2ff', bybit: '#f39c12', 
            okx: '#34E0FF', gateio: '#f84949', bitget: '#00D1FF', htx: '#00A6FF', 
            bitmart: '#00cc99', phemex: '#2980b9'
        };
        let activeExchange = null;
        let allExchangeData = [];
        let currentSort = { col: 'change', desc: true };
        let timerInterval = null;
        let lastLoggedCount = 0;
        let exchangeMetadata = {}; // Store Min Trade limits

        function addLog(msg) {
            const container = document.getElementById('log-container');
            if (!container) return;
            if (container.children.length > 50) container.removeChild(container.firstChild);
            const time = new Date().toLocaleTimeString([], { hour12: false });
            const div = document.createElement('div');
            div.className = "mb-1 border-l border-green-500/20 pl-2";
            div.innerHTML = `<span class="text-gray-600 mr-2">[${time}]</span> ${msg}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function initButtons() {
            const container = document.getElementById('exchange-buttons');
            Object.entries(exchangeList).forEach(([id, color]) => {
                const btn = document.createElement('button');
                btn.id = `btn-${id}`;
                btn.className = 'btn-ex';
                btn.style.backgroundColor = color;
                btn.textContent = `${id} START`;
                btn.onclick = () => toggleExchange(id);
                container.appendChild(btn);
            });
        }

        // Recursive Scanner logic from aaa.py
        function scanRisk(obj, foundTags = new Set()) {
            const riskKeywords = ['ST', 'MONITORING', 'SEED', 'DELIST', 'WARNING', 'RISK', 'SPECIAL'];
            if (typeof obj === 'string') {
                const valUp = obj.toUpperCase();
                riskKeywords.forEach(kw => { if (valUp.includes(kw)) foundTags.add(kw); });
            } else if (Array.isArray(obj)) {
                obj.forEach(item => scanRisk(item, foundTags));
            } else if (typeof obj === 'object' && obj !== null) {
                Object.values(obj).forEach(v => scanRisk(v, foundTags));
            }
            return Array.from(foundTags).join('/');
        }

        // Full Name Extraction logic from aaa.py
        function getFullName(symbol, info) {
            const base = symbol.split(/[/-]/)[0];
            let name = base;
            const nameKeys = ['fullName', 'baseCurrencyFullName', 'displayName', 'assetName', 'baseAsset', 'coinName', 'name'];
            for (let k of nameKeys) {
                if (info[k] && typeof info[k] === 'string' && info[k].toUpperCase() !== base.toUpperCase()) {
                    name = info[k];
                    break;
                }
            }
            name = name.replace('/USDT', '').trim();
            return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        }

        // --- NEW: Fetch Market Limits (Min Trade) ---
        async function fetchExchangeInfo(ex) {
            const type = document.getElementById('market-type').value;
            try {
                const res = await fetch(`/api/universal?exchange=${ex}&type=${type}&info=true`);
                const raw = await res.json();
                exchangeMetadata[ex] = {};
                
                // Normalize different metadata structures (Binance, Bybit, OKX, Gate, Bitmart, etc.)
                let list = [];
                if (Array.isArray(raw)) list = raw;
                else if (raw.symbols && Array.isArray(raw.symbols)) list = raw.symbols;
                else if (raw.data?.products && Array.isArray(raw.data.products)) list = raw.data.products;
                else if (raw.data?.symbols && Array.isArray(raw.data.symbols)) list = raw.data.symbols;
                else if (raw.data && Array.isArray(raw.data)) list = raw.data;
                else if (raw.result?.list && Array.isArray(raw.result.list)) list = raw.result.list;
                else if (raw.result && Array.isArray(raw.result)) list = raw.result;
                
                list.forEach(m => {
                    const sym = (m.symbol || m.instId || m.currency_pair || m.id || '').toUpperCase();
                    let minQty = 0, minCost = 0;

                    if (ex === 'binance' || ex === 'mexc') {
                        const f = m.filters?.find(f => f.filterType === 'LOT_SIZE');
                        minQty = parseFloat(f?.minQty || 0);
                        minCost = parseFloat(m.filters?.find(f => f.filterType === 'NOTIONAL')?.minNotional || 0);
                    } else if (ex === 'kucoin') {
                        minQty = parseFloat(m.baseMinSize || 0);
                        minCost = parseFloat(m.minFunds || 0);
                    } else if (ex === 'bybit') {
                        minQty = parseFloat(m.lotSizeFilter?.minOrderQty || 0);
                    } else if (ex === 'bitmart') {
                        minQty = parseFloat(m.min_buy_amount || 0);
                        minCost = parseFloat(m.min_notional || 0);
                    } else if (ex === 'gateio') {
                        minCost = parseFloat(m.min_quote_amount || 0);
                    }
                    
                    exchangeMetadata[ex][sym] = { minQty, minCost };
                });
                addLog(`✅ ${ex.toUpperCase()} limits loaded.`);
            } catch (e) {
                addLog(`⚠️ ${ex.toUpperCase()} metadata error: ${e.message}`);
            }
        }

        async function toggleExchange(id) {
            if (activeExchange === id) {
                activeExchange = null;
                clearInterval(timerInterval);
                addLog(`${id.toUpperCase()} connection terminated.`);
                document.getElementById('master-timer').textContent = "OFF";
                document.getElementById(`btn-${id}`).textContent = `${id} START`;
                allExchangeData = [];
                lastLoggedCount = 0;
                renderUI();
                return;
            }
            // Stop others
            Object.keys(exchangeList).forEach(ex => {
                document.getElementById(`btn-${ex}`).textContent = `${ex} START`;
            });
            activeExchange = id;
            document.getElementById(`btn-${id}`).textContent = `${id} STOP`;
            addLog(`Connecting to ${id.toUpperCase()}...`);
            
            // Load Metadata first for Min Trade
            if (!exchangeMetadata[id]) await fetchExchangeInfo(id);
            
            fetchData();
            if (timerInterval) clearInterval(timerInterval);
            let countdown = 50;
            timerInterval = setInterval(() => {
                countdown--;
                document.getElementById('master-timer').textContent = (countdown / 10).toFixed(1) + "s";
                if (countdown <= 0) { countdown = 50; fetchData(); }
            }, 100);
        }

        async function fetchData() {
            if (!activeExchange) return;
            const type = document.getElementById('market-type').value;
            try {
                const res = await fetch(`/api/universal?exchange=${activeExchange}&type=${type}`);
                const raw = await res.json();
                processData(activeExchange, raw);
            } catch (e) {
                console.error("API Error", e);
                addLog(`⚠️ Error fetching ${activeExchange.toUpperCase()}: ${e.message}`);
            }
        }

        // Бирж бүрийн өөр өөр нэршилтэй талбаруудыг нэгтгэж унших функц
        function processData(ex, rawData) {
            let processed = [];
            // Бирж болгоны JSON бүтэц өөр тул жагсаалтыг зөв салгаж авах
            let list = Array.isArray(rawData) ? rawData : 
                       (rawData.data?.ticker || rawData.result?.list || rawData.result || rawData.data || rawData.tick?.data || []);
            
            // Bitmart v3 Tickers нь массив дотор массив (Array of Arrays) ирдэг онцлогтой
            const isArrayOfArrays = list.length > 0 && Array.isArray(list[0]);
            
            list.forEach(t => {
                let symbol, lastRaw, bidRaw, askRaw;
                
                if (isArrayOfArrays) {
                    symbol = t[0]; lastRaw = t[1]; bidRaw = t[2]; askRaw = t[3];
                } else {
                    symbol = (t.symbol || t.instId || t.s || t.currency_pair || t.inst_id || t.pair || '').toUpperCase();
                    lastRaw = t.lastPrice || t.last || t.lastPr || t.close || t.last_price || t.sell || t.lastEp;
                    bidRaw = t.bidPrice || t.buy || t.bid1Price || t.bidPx || t.highest_bid || t.bidPr || t.best_bid || t.bid1 || t.bidEp;
                    askRaw = t.askPrice || t.sell || t.ask1Price || t.askPx || t.lowest_ask || t.askPr || t.best_ask || t.ask1 || t.askEp;
                }
                
                if (!symbol || !symbol.includes('USDT')) return;

                let lastNum = parseFloat(lastRaw) || 0;
                let bidNum = parseFloat(bidRaw) || lastNum;
                let askNum = parseFloat(askRaw) || lastNum;
                
                // Phemex-ийн үнэ маш том (10^8) ирдэг тул жинхэнэ утга руу нь хөрвүүлнэ
                if (t.lastEp || t.bidEp || (ex === 'phemex' && lastNum > 10000000)) {
                    lastNum /= 1e8; bidNum /= 1e8; askNum /= 1e8;
                }

                if (lastNum === 0) return;
                
                // 24ц өөрчлөлтийг тооцоолох/унших
                let change = 0;
                if (t.priceChangePercent !== undefined) change = parseFloat(t.priceChangePercent);
                else if (t.changeRate !== undefined) change = parseFloat(t.changeRate) * 100;
                else if (t.price24hPcnt !== undefined) change = parseFloat(t.price24hPcnt) * 100;
                else if (t.change_percentage !== undefined) change = parseFloat(t.change_percentage);
                else if (isArrayOfArrays) change = parseFloat(t[8]) || 0;
                else if (t.open24h || t.open) {
                    const open = parseFloat(t.open24h || t.open);
                    change = ((lastNum - open) / open) * 100;
                }

                const spread = bidNum > 0 ? ((askNum - bidNum) / bidNum * 100) : 0;

                // --- DATA INTEGRITY CHECK (Эхний дата дээр багануудыг шалгах) ---
                if (lastLoggedCount === 0 && processed.length === 0) {
                    const issues = [];
                    if (!lastNum || isNaN(lastNum)) issues.push("Price");
                    if (!bidNum || isNaN(bidNum)) issues.push("Bid");
                    if (!askNum || isNaN(askNum)) issues.push("Ask");
                    
                    if (issues.length > 0 && processed.length === 0) {
                        addLog(`⚠️ <span class="text-red-500 font-bold">Parser Alert:</span> ${ex.toUpperCase()} missing fields: ${issues.join(', ')}`);
                    } else if (processed.length === 0) {
                        addLog(`✅ <span class="text-blue-400">Integrity Pass:</span> ${ex.toUpperCase()} columns mapped correctly.`);
                    }
                }
                
                const cleanSym = symbol.replace(/[-_:/]/g, '').replace('USDT', '/USDT');
                
                // Calculate Min Trade in USDT
                let minUsdt = 0;
                const meta = exchangeMetadata[ex]?.[symbol];
                if (meta) {
                    if (meta.minCost > 0) minUsdt = meta.minCost;
                    else if (meta.minQty > 0) minUsdt = meta.minQty * askNum;
                }

                processed.push({
                    name: getFullName(symbol, t),
                    symbol: cleanSym,
                    price: lastNum, bid: bidNum, ask: askNum,
                    spread: spread,
                    change: change,
                    min_usdt: minUsdt, 
                    tags: scanRisk(t)
                });
            });

            allExchangeData = processed;
            
            // Зөвхөн зоосны тоо өөрчлөгдөхөд л лог дээр бичнэ
            if (processed.length !== lastLoggedCount) {
                addLog(`${ex.toUpperCase()} Feed: ${processed.length} USDT pairs active.`);
                lastLoggedCount = processed.length;
            }
            renderUI();
        }

        function resetAndFetch() {
            if (activeExchange) {
                const id = activeExchange;
                activeExchange = null;
                toggleExchange(id);
            }
        }

        function updateSort(col) {
            if (currentSort.col === col) currentSort.desc = !currentSort.desc;
            else { currentSort.col = col; currentSort.desc = true; }
            renderUI();
        }

        function renderUI() {
            const tbody = document.getElementById('master-table');
            const search = document.getElementById('global-search').value.trim().toUpperCase();
            if (!tbody) return;
            tbody.innerHTML = '';

            if (!Array.isArray(allExchangeData)) return;
            let data = [...allExchangeData];
            if (search) data = data.filter(d => d.symbol.includes(search) || (d.name && d.name.toUpperCase().includes(search)));

            data.sort((a, b) => {
                let valA = a[currentSort.col], valB = b[currentSort.col];
                if (typeof valA === 'string') return currentSort.desc ? valB.localeCompare(valA) : valA.localeCompare(valB);
                return currentSort.desc ? valB - valA : valA - valB;
            });

            data.forEach(d => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="color:#aaa">${d.name}</td>
                    <td class="font-bold">${d.symbol}</td>
                    <td class="text-right">${d.price.toFixed(6).replace(/\.?0+$/, "")}</td>
                    <td class="text-right neg-pct">${d.bid.toFixed(6).replace(/\.?0+$/, "")}</td>
                    <td class="text-right pos-pct">${d.ask.toFixed(6).replace(/\.?0+$/, "")}</td>
                    <td class="text-right spread-val">${d.spread.toFixed(2)}%</td>
                    <td class="text-right font-bold ${d.change >= 0 ? 'pos-pct' : 'neg-pct'}">${d.change >= 0 ? '+' : ''}${d.change.toFixed(2)}%</td>
                    <td class="text-right" style="color:#666">${d.min_usdt > 0 ? d.min_usdt.toFixed(2) : '--'}</td>
                    <td>${d.tags ? `<span class="tag-st">${d.tags}</span>` : ''}</td>
                `;
                tbody.appendChild(row);
            });
        }
        initButtons();
    </script>
</body>
</html>
