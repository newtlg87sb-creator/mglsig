                    { title: 'Хөрөнгө оруулагчийн дохио', description: 'Хөрөнгө оруулагчдад "уналтыг худалдаж авах" боломжийг олоход зориулагдсан урт хугацааны дохио.', link: 'signal/investment.html', badge: 'Holder Tracker' },
                    { title: 'Backtester', description: 'Өөрийн арилжааны стратегийг түүхэн өгөгдөл дээр тохируулж болох параметрүүдээр шалгаарай.', link: 'Backtest.html', badge: 'History Audit' },

        if (typeof window.translations === 'undefined') window.translations = { mn: {}, en: {} };
        Object.keys(pageTranslations).forEach(lang => {
            window.translations[lang] = { ...window.translations[lang], ...pageTranslations[lang] };
        });

        // ── БРО-ГИЙН ХЭЛНИЙ АВТОМАТ МАСК СИНХРОНЧЛОЛ ──
        function syncDynamicToolsText() {
            setTimeout(() => {
                document.querySelectorAll('.mgl-spotlight-text').forEach(el => {
                    const visibleText = el.textContent.trim();
                    if (visibleText) {
                        el.setAttribute('data-text', visibleText);
                    }
                });
            }, 60);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const renderTools = () => {
                const lang = localStorage.getItem('lang') || 'mn';
                const container = document.getElementById('tools-container');
                
                if(!container || !window.translations[lang] || !window.translations[lang]['signal-list']) return;

                container.innerHTML = window.translations[lang]['signal-list']
                    .filter(item => item.link !== 'future.html' && item.link !== 'spot.html')
                    .map(item => {
                        const isComingSoon = item.status === 'coming_soon';
                        const openToolText = window.translations[lang]['btn-open-tool'] || 'Open';
                        const comingSoonText = window.translations[lang]['sig-coming-soon'] || 'Coming Soon';
                        
                        return `
                        <a href="${isComingSoon ? '#' : item.link}" class="group relative bg-brand-dark-blue border border-brand-border rounded-xl p-5 hover:border-brand-gold/30 transition duration-500 flex flex-col justify-between overflow-hidden ${isComingSoon ? 'opacity-40 cursor-not-allowed grayscale' : ''}">
                            
                            <!-- 1. LUXURY ТУУЗ: Зүүн дээд өнцөгт ууссан алтлаг нарийн шугам -->
                            <div class="absolute top-0 left-0 w-12 h-[1.5px] bg-gradient-to-r from-brand-gold via-brand-gold/40 to-transparent shadow-[0_0_8px_rgba(197,160,89,0.4)]"></div>
                            
                            <div>
                                <!-- 2. ЖИНХЭНЭ ТЕРМИНАЛ ТОХИРГОО: Иконгүй, амьд лугшилт болон нарийн бичвэр -->
                                <div class="flex items-center space-x-1.5 mb-5">
                                    <span class="flex h-1 w-1 relative">
                                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-gold opacity-75"></span>
                                        <span class="relative inline-flex rounded-full h-1 w-1 bg-brand-gold"></span>
                                    </span>
                                    <span class="text-[8px] font-bold tracking-[0.15em] text-brand-gold/50 uppercase group-hover:text-brand-gold transition duration-300">${item.badge || 'Tracer Active'}</span>
                                </div>
                                
                                <h3 class="text-white text-sm font-bold mb-1.5 uppercase tracking-wide group-hover:text-brand-gold transition">${item.title}</h3>
                                <!-- 3. АЛТ-МӨНГӨН ГЭРЭЛТЭХ ТЕКСТҮҮД -->
                                <p class="mgl-spotlight-text text-gray-500 text-[11px] leading-relaxed mb-4" data-text="${item.description}">${item.description}</p>
                            </div>
                            
                            <!-- Төгсгөлийн нарийн товчлуур -->
                            <div class="mt-auto pt-2">
                                ${isComingSoon ? 
                                    `<span class="text-[8px] bg-white/5 border border-white/5 text-gray-500 px-2 py-0.5 rounded font-black tracking-wider uppercase">${comingSoonText}</span>` : 
                                    `<span class="text-brand-gold text-[9px] font-black uppercase tracking-[0.15em] flex items-center">${openToolText} <i class="fas fa-arrow-right ml-1.5 text-[8px] group-hover:translate-x-1 transition duration-300"></i></span>`
                                }
                            </div>
                        </a>
                        `;
                    }).join('');

                // Картнууд зурагдаж дууссаны дараа маскийг асаах
                syncDynamicToolsText();
            };

            renderTools();

            // Хэл солигдоход картыг дахин зурах
            const originalChangeLang = window.changeLang;
            window.changeLang = function(language) {
                if (originalChangeLang) originalChangeLang(language);
                renderTools();
            };
        });
    </script>
